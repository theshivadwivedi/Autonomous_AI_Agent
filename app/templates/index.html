<!DOCTYPE html>
<html>

<head>
    <title>Autonomous AI Agent</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            margin:40px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,.1);
        }

        textarea{
            width:100%;
            height:120px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:15px;
            padding:12px 20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        pre{
            background:#f7f7f7;
            padding:15px;
            border-radius:8px;
            overflow:auto;
        }

    </style>

</head>

<body>

<div class="container">

<h1>🤖 Autonomous AI Agent</h1>

<p>
Enter a business request.
The agent will create its own plan,
execute every task,
and generate a Word document.
</p>

<textarea id="request">

Create a business proposal for an AI HR Assistant.

</textarea>

<br>

<button onclick="runAgent()">

Run Agent

</button>

<hr>

<h2>Result</h2>

<pre id="output">

Waiting...

</pre>

</div>

<script>

async function runAgent(){

    const request=document.getElementById("request").value;

    document.getElementById("output").textContent="Running Agent...";

    const response=await fetch("/agent",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            request:request
        })

    });

    const data=await response.json();

    document.getElementById("output").textContent=
        JSON.stringify(data,null,4);

}

</script>

</body>

</html>
